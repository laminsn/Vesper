<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="vGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="100%" stop-color="#048a68"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="outerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#06d6a0" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0a0a0f"/>

  <!-- Subtle emerald border -->
  <rect width="512" height="512" rx="96" ry="96" fill="none" stroke="#06d6a0" stroke-opacity="0.15" stroke-width="2"/>

  <!-- V mark with glow -->
  <g filter="url(#outerGlow)">
    <line x1="128" y1="140" x2="256" y2="380" stroke="url(#vGrad)" stroke-width="36" stroke-linecap="round"/>
    <line x1="384" y1="140" x2="256" y2="380" stroke="url(#vGrad)" stroke-width="36" stroke-linecap="round"/>
  </g>

  <!-- Precision vertex glow point -->
  <circle cx="256" cy="380" r="8" fill="#06d6a0" filter="url(#glow)"/>

  <!-- Tech accent lines at top -->
  <line x1="118" y1="130" x2="148" y2="130" stroke="#06d6a0" stroke-opacity="0.4" stroke-width="4" stroke-linecap="round"/>
  <line x1="364" y1="130" x2="394" y2="130" stroke="#06d6a0" stroke-opacity="0.4" stroke-width="4" stroke-linecap="round"/>
</svg>
